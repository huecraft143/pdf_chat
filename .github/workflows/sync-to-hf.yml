name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

jobs:
  sync-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Prepare backend files
        run: |
          mkdir -p /tmp/hf-backend
          cp Dockerfile /tmp/hf-backend/Dockerfile
          cp backend/main.py /tmp/hf-backend/main.py
          cp backend/requirements.txt /tmp/hf-backend/requirements.txt
          cat > /tmp/hf-backend/README.md << 'EOF'
          ---
          title: PDF Chat API
          emoji: 🔧
          colorFrom: gray
          colorTo: gray
          sdk: docker
          pinned: false
          ---
          EOF
      - name: Push to HF backend Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/hf-backend
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "sync from GitHub"
          git branch -m master main
          git push --force https://huecraft143:$HF_TOKEN@huggingface.co/spaces/huecraft143/pdf-chat-api main

  sync-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Prepare frontend files
        run: |
          mkdir -p /tmp/hf-frontend
          cp frontend/app.py /tmp/hf-frontend/app.py
          cp frontend/requirements.txt /tmp/hf-frontend/requirements.txt
          cat > /tmp/hf-frontend/README.md << 'EOF'
          ---
          title: PDF Chat
          emoji: 📄
          colorFrom: blue
          colorTo: purple
          sdk: streamlit
          sdk_version: 1.39.0
          app_file: app.py
          pinned: false
          ---
          EOF
      - name: Push to HF frontend Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/hf-frontend
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "sync from GitHub"
          git branch -m master main
          git push --force https://huecraft143:$HF_TOKEN@huggingface.co/spaces/huecraft143/pdf-chat main
